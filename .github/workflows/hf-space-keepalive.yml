name: Keep Private Hugging Face Space Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: hf-space-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping private HF Space
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_SPACE_URL" ]; then
            echo "HF_SPACE_URL secret is missing"
            exit 1
          fi

          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is missing"
            exit 1
          fi

          curl --retry 2 --retry-delay 10 --max-time 60 --fail --location \
            -H "Authorization: Bearer $HF_TOKEN" \
            "$HF_SPACE_URL" >/dev/null
